[build]
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PRIVATE_TARGET = "standalone"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 安全 Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA Fallback - 所有路由回退到 index.html
[[redirects]]
  from = "/:path*"
  to = "/index.html"
  status = 200
  conditions = {Language = ["en"]}

[[redirects]]
  from = "/:path*"
  to = "/index.html"
  status = 200
  conditions = {Language = ["zh"]}

[[redirects]]
  from = "/:path*"
  to = "/index.html"
  status = 200
