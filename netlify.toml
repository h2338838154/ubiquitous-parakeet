[build]
  command = "pnpm install && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 传递环境变量到 Functions
[functions]
  included_files = ["!node_modules/.cache/**"]

# 将 NEXT_PUBLIC 变量传递给服务端
[context.production.environment]
  NODE_ENV = "production"
